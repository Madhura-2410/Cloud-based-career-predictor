services:
  # Local SQL Server (for development)
  sql-database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "DevPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - ./database_schema:/schema
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/1433'" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  # Backend API (serves both backend API and frontend)
  backend-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SQL_SERVER: sql-database
      SQL_DATABASE: ai_skill_platform_db
      SQL_USERNAME: sa
      SQL_PASSWORD: "DevPassword123!"
      API_PORT: 8000
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      sql-database:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - static-files:/app/static
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload


volumes:
  sql-data:
  static-files:
